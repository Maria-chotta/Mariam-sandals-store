<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <h1>Order Dashboard</h1>
  </header>

  <section class="section-title">
    <h2>Saved Orders</h2>
    <p>View all orders collected from customers while the backend is running.</p>
  </section>

  <div id="ordersList" style="padding: 0 8%;"></div>

  <script>
    async function loadOrders() {
      const list = document.getElementById('ordersList');
      try {
        const response = await fetch('/api/orders');
        const orders = await response.json();

        if (!orders.length) {
          list.innerHTML = '<p>No orders found yet.</p>';
          return;
        }

        list.innerHTML = orders.map(order => {
          const items = order.items.map(item => `<li>${item.name} × ${item.quantity} - ${item.price} TSh</li>`).join('');
          return `
            <div class="testimonial" style="text-align:left; padding:24px; margin-bottom:24px; border-radius:20px; background:#ffffff; box-shadow:0 18px 40px rgba(15,23,42,0.08);">
              <h3>Order #${order._id.slice(-6)}</h3>
              <p><strong>Name:</strong> ${order.customer.name}</p>
              <p><strong>Phone:</strong> ${order.customer.phone}</p>
              <p><strong>Address:</strong> ${order.customer.address}</p>
              <p><strong>Note:</strong> ${order.customer.note || 'None'}</p>
              <p><strong>Total:</strong> ${order.total.toLocaleString()} TSh</p>
              <p><strong>Items:</strong></p>
              <ul>${items}</ul>
              <p><strong>Status:</strong> ${order.status}</p>
              <p><em>${new Date(order.createdAt).toLocaleString()}</em></p>
            </div>
          `;
        }).join('');
      } catch (err) {
        list.innerHTML = `<p style="color:#ef4444;">Unable to load orders. Make sure the backend is running.</p>`;
        console.error(err);
      }
    }

    loadOrders();
  </script>
</body>
</html>
